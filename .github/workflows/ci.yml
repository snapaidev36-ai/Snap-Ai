            R2_BUCKET_NAME: snap-ai
            RESEND_API_KEY: ci-resend-api-key
            RESEND_FROM: "Snap AI <ci@example.com>"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run build
              run: npm run build
