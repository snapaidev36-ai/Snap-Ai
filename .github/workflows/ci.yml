name: CI

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

    build:
        name: Build
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        needs: lint
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: mongodb://localhost:27017/snap-ai
            JWT_ACCESS_SECRET: 12345678901234567890123456789012
            JWT_REFRESH_SECRET: 12345678901234567890123456789012
            FIREBASE_PROJECT_ID: ci-project
            FIREBASE_CLIENT_EMAIL: ci@example.com
            FIREBASE_PRIVATE_KEY: ci-private-key
            NEXT_PUBLIC_FIREBASE_API_KEY: ci-api-key
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-project.appspot.com
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 1234567890
            NEXT_PUBLIC_FIREBASE_APP_ID: 1:1234567890:web:abcdef123456
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-TEST123

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run build
              run: npm run build
