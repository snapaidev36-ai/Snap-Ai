name: CI

on:
    push:
        branches:
            - "**"
    pull_request:
        branches:
            - main
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint

    build:
        name: Build
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        needs: lint
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: mongodb://localhost:27017/snap-ai
            JWT_ACCESS_SECRET: fc67e2dba27946302b423c45d4fa0d4814b00e6b9471a8193b226a3a010b7033ce9d57a471be32a2e06705293f25e898019912449d0fe1ac0e665c53cc14421c
            JWT_REFRESH_SECRET: fc67e2dba27946302b423c45d4fa0d4814b00e6b9471a8193b226a3a010b7033ce9d57a471be32a2e06705293f25e898019912449d0fe1ac0e665c53cc14421c
            FIREBASE_PROJECT_ID: ci-project
            FIREBASE_CLIENT_EMAIL: ci@example.com
            FIREBASE_PRIVATE_KEY_API_KEY_HASH: ci.private-key-hash
            NEXT_PUBLIC_FIREBASE_API_KEY: ci-api-key
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-project.appspot.com
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 1234567890
            NEXT_PUBLIC_FIREBASE_APP_ID: 1:1234567890:web:abcdef123456
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-TEST123
            REPLICATE_API_KEY: ci-replicate-api-key
            R2_S3_ENDPOINT: https://ci-r2-account-id.r2.cloudflarestorage.com
            R2_ACCOUNT_ID: ci-r2-account-id
            R2_ACCOUNT_TOKEN: ci-r2-account-token
            R2_ACCESS_ID: ci-r2-access-id
